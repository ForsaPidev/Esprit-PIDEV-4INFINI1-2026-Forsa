# Démarrage :
#   mvn spring-boot:run -Dspring-boot.run.profiles=ngrok
# ou : java -jar app.jar --spring.profiles.active=ngrok
# Puis dans un autre terminal : ngrok http 8089
#
# Base URL Angular (environment.mobile.ts) :
#   https://<sous-domaine>.ngrok-free.app/forsaPidev/api
#
# Passkeys / Face ID : rp-id = hostname of this URL (must match the tab where the Angular app is opened).
app.frontend.base-url=https://bigotedly-youthful-dino.ngrok-free.dev

server.address=0.0.0.0
server.forward-headers-strategy=framework
